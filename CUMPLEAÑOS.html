<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Cumpleaños - Mayor Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --accent-color: #a855f7;
            --highlight-gold: #f59e0b;
            --highlight-bg: rgba(245, 158, 11, 0.15);
            /* Colores de marca basados en el logo Mayor Center */
            --mayor-green: #38bdf8; /* Reemplazo de cyan por el verde más claro del logo */
            --mayor-dark-green: #15803d; /* Un verde más oscuro inspirado en el logo */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Lienzo de Animaciones de Fondo */
        #fx-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 3rem;
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 1rem;
        }

        /* Estilo de Integración del Logo */
        .logo-container {
            flex-shrink: 0;
            width: 180px; /* Tamaño del logo */
            transition: all 0.3s ease;
        }

        .logo {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 3.2rem);
            font-weight: 700;
            background: linear-gradient(to right, #fff, #a855f7, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: right;
            margin-left: 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 3rem 4rem;
            position: relative;
            z-index: 2;
        }

        /* Cuadrícula Responsive */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 1.8rem;
        }

        /* Estilo de Tarjetas - Glassmorphism */
        .month-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 0.8s forwards;
            position: relative;
            overflow: hidden;
        }

        .month-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Destacado del Mes Actual */
        .month-card.current-month {
            background: var(--highlight-bg);
            border: 2px solid var(--highlight-gold);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.35);
        }

        .month-card.current-month::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245,158,11,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .badge-current {
            display: inline-block;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.35rem 0.8rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        .month-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
            margin-bottom: 1.2rem;
        }

        .month-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .month-count {
            background: rgba(255, 255, 255, 0.15);
            font-size: 0.85rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            color: var(--text-secondary);
        }

        /* Lista de Cumpleañeros */
        .birthday-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .birthday-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            padding: 0.8rem 1rem;
            border-radius: 14px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: default;
        }

        /* Efecto Hover sobre la persona */
        .birthday-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.03) translateX(4px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .person-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .avatar-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.3);
        }

        .current-month .avatar-icon {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.4);
        }

        .person-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            line-height: 1.3;
            text-transform: capitalize;
        }

        .birthday-date {
            font-size: 0.85rem;
            font-weight: 600;
            color: #f472b6;
            background: rgba(244, 114, 182, 0.1);
            padding: 0.3rem 0.7rem;
            border-radius: 8px;
            white-space: nowrap;
        }

        .current-month .birthday-date {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.15);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsiveness para móviles y tabletas */
        @media (max-width: 900px) {
            header {
                padding: 1rem 2rem;
            }
            .logo-container {
                width: 130px;
            }
        }

        @media (max-width: 480px) {
            header {
                flex-direction: column;
                padding: 1.5rem 1rem;
                text-align: center;
            }
            .logo-container {
                width: 110px;
                margin-bottom: 0.8rem;
            }
            h1 {
                text-align: center;
                margin-left: 0;
            }
            .container {
                padding: 1rem 1rem 4rem;
            }
            .board-grid { grid-template-columns: 1fr; }
            .month-card { padding: 1.4rem; }
            .person-name { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <canvas id="fx-canvas"></canvas>

    <header>
        <div class="logo-container">
            <img src="logo mayor center.png" alt="Logo Mayor Center" class="logo">
        </div>
        <h1>🎉 Cartelera de Cumpleaños 🎂</h1>
    </header>

    <main class="container">
        <div id="board" class="board-grid">
            <!-- Las tarjetas se generarán dinámicamente aquí mediante JavaScript -->
        </div>
    </main>

    <script>
        // 1. FUENTE DE DATOS (Extraída de la imagen y estructurada)
        const rawData = [
            { name: "PENELOPE FRANCHESKA GUTIERREZ", day: 11, month: 7 },
            { name: "JORGE ALBERTO PAREJO LANDINEZ", day: 7, month: 9 },
            { name: "XAVIELIS ROSAELIS GONZALEZ RODRIGUEZ", day: 11, month: 9 },
            { name: "ELAINNE NAZARETH MADRID TORRES", day: 17, month: 4 },
            { name: "FRANYER RAYDIER ARAY ARAY", day: 8, month: 7 },
            { name: "ANGIE NATALY FUENTES DIAZ", day: 14, month: 4 },
            { name: "FRANCISCO JAVIER CASTILLO PACHECO", day: 8, month: 3 },
            { name: "ELIANNYS ALEJANDRA DIAZ SARMIENTO", day: 7, month: 8 },
            { name: "CARLOS DANIEL CAMBERO CASTILLO", day: 6, month: 9 },
            { name: "ISAAC GABRIEL RANGEL CORDERO", day: 11, month: 6 },
            { name: "CARLOS EDUARDO GAMARRA LOPEZ", day: 25, month: 10 },
            { name: "MARIANA VALENTINA PINEDA LOPEZ", day: 3, month: 11 },
            { name: "MELIANNIS MICHELLE VILORIA GUTIERREZ", day: 26, month: 12 },
            { name: "ONEIRIS COROMOTO LOPEZ COLMENAREZ", day: 23, month: 6 },
            { name: "YOSIANGEL DEL CAMEN VILLASANA VIÑA", day: 27, month: 3 },
            { name: "LEONARDO JOSE LUQUE GONZALEZ", day: 30, month: 8 },
            { name: "DAVID", day: 3, month: 1 },
            { name: "ROSALIA", day: 22, month: 9 },
            { name: "MARIA FERNANDA BERRIOS MORENO", day: 3, month: 11 },
            { name: "NICOL KATHERIN SAEZ JIMENEZ", day: 3, month: 4 }
        ];

        const monthNames = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", 
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        const monthIcons = [
            "❄️", "💘", "🌱", "🌸", "☀️", "🍉", 
            "🏖️", "🍦", "🍂", "🎃", "🍁", "🎄"
        ];

        // 2. LÓGICA DE PROCESAMIENTO Y ORDENAMIENTO
        function formatName(str) {
            return str.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
        }

        function getInitials(name) {
            const parts = name.trim().split(" ");
            if (parts.length >= 2) {
                return (parts[0][0] + parts[1][0]).toUpperCase();
            }
            return parts[0].substring(0, 2).toUpperCase();
        }

        function renderBoard() {
            const board = document.getElementById("board");
            const currentMonth = new Date().getMonth() + 1; // 1 - 12

            // Ordenar por mes y luego por día
            rawData.sort((a, b) => {
                if (a.month !== b.month) return a.month - b.month;
                return a.day - b.day;
            });

            // Agrupar por mes
            const groupedByMonth = {};
            rawData.forEach(item => {
                if (!groupedByMonth[item.month]) {
                    groupedByMonth[item.month] = [];
                }
                groupedByMonth[item.month].push(item);
            });

            // Renderizar tarjetas
            let delayCounter = 0;
            for (let m = 1; m <= 12; m++) {
                if (!groupedByMonth[m]) continue; // Solo mostrar meses con cumpleaños

                const isCurrentMonth = (m === currentMonth);
                const monthPeople = groupedByMonth[m];
                
                const card = document.createElement("div");
                card.className = `month-card ${isCurrentMonth ? 'current-month' : ''}`;
                card.style.animationDelay = `${delayCounter * 0.12}s`;
                delayCounter++;

                let badgeHtml = isCurrentMonth ? `<span class="badge-current">👑 Mes Actual</span>` : '';
                
                let listHtml = '<ul class="birthday-list">';
                monthPeople.forEach(person => {
                    const formattedName = formatName(person.name);
                    const initials = getInitials(person.name);
                    const crownIcon = isCurrentMonth ? '👑 ' : '';
                    
                    listHtml += `
                        <li class="birthday-item">
                            <div class="person-info">
                                <div class="avatar-icon">${initials}</div>
                                <span class="person-name">${crownIcon}${formattedName}</span>
                            </div>
                            <span class="birthday-date">${person.day} de ${monthNames[m-1].toLowerCase()}</span>
                        </li>
                    `;
                });
                listHtml += '</ul>';

                card.innerHTML = `
                    ${badgeHtml}
                    <div class="month-header">
                        <div class="month-title">
                            <span>${monthIcons[m-1]}</span>
                            <span>${monthNames[m-1]}</span>
                        </div>
                        <span class="month-count">${monthPeople.length}</span>
                    </div>
                    ${listHtml}
                `;

                board.appendChild(card);
            }
        }

        // 3. ANIMACIÓN DE FONDO (CONFETI Y GLOBOS EN CANVAS)
        function initFX() {
            const canvas = document.getElementById('fx-canvas');
            const ctx = canvas.getContext('2d');
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });

            // Colores basados en el logo (Cyan/Verde y Amarillo) más toques festivos
            const colors = ['#f472b6', '#38bdf8', '#f59e0b', '#34d399', '#fbb6ce', '#ffffff'];
            const particles = [];

            // Generar partículas (Confeti y Globos)
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedY: (Math.random() - 0.3) * 1.5, // Algunos suben (globos), otros bajan (confeti)
                    speedX: (Math.random() - 0.5) * 1,
                    angle: Math.random() * 360,
                    spin: (Math.random() - 0.5) * 0.05,
                    type: Math.random() > 0.4 ? 'confetti' : 'balloon'
                });
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);

                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.angle += p.spin;

                    // Reposicionar al salir de pantalla
                    if (p.y > height + 20) { p.y = -20; p.x = Math.random() * width; }
                    if (p.y < -20) { p.y = height + 20; p.x = Math.random() * width; }
                    if (p.x > width + 20) { p.x = -20; }
                    if (p.x < -20) { p.x = width + 20; }

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);

                    if (p.type === 'confetti') {
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                    } else {
                        // Dibujar globo translúcido
                        ctx.beginPath();
                        ctx.arc(0, 0, p.size * 1.5, 0, Math.PI * 2);
                        ctx.fillStyle = p.color + '44'; // Transparencia
                        ctx.fill();
                        ctx.strokeStyle = p.color;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }

                    ctx.restore();
                });

                requestAnimationFrame(animate);
            }

            animate();
        }

        // Inicializar al cargar el documento
        document.addEventListener("DOMContentLoaded", () => {
            renderBoard();
            initFX();
        });
    </script>
</body>
</html>
